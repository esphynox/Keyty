name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: ${{ !endsWith(github.ref_name, '-test') }}
    runs-on: macos-latest

    env:
      APPCAST_DOWNLOAD_PREFIX: ${{ vars.APPCAST_DOWNLOAD_PREFIX }}
      GH_TOKEN: ${{ github.token }}
      KEYTY_RELEASE_TEAM_ID: ${{ vars.KEYTY_RELEASE_TEAM_ID || 'NEVA4MAZBL' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Tuist
        run: brew install tuist

      - name: Install Ruby dependencies
        run: bundle install

      - name: Install DMG packaging dependencies
        run: |
          python3 -m venv .venv-release
          .venv-release/bin/python -m pip install --upgrade pip
          .venv-release/bin/python -m pip install -r requirements-release.txt
          printf '%s\n' "$PWD/.venv-release/bin" >> "$GITHUB_PATH"

      - name: Prepare release secrets
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          NOTARY_KEY_BASE64: ${{ secrets.NOTARY_KEY_BASE64 }}
          SPARKLE_ED_KEY_BASE64: ${{ secrets.SPARKLE_ED_KEY_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$DEVELOPER_ID_CERTIFICATE_BASE64" || { echo "Missing DEVELOPER_ID_CERTIFICATE_BASE64 secret" >&2; exit 1; }
          test -n "$NOTARY_KEY_BASE64" || { echo "Missing NOTARY_KEY_BASE64 secret" >&2; exit 1; }
          test -n "$SPARKLE_ED_KEY_BASE64" || { echo "Missing SPARKLE_ED_KEY_BASE64 secret" >&2; exit 1; }
          mkdir -p "$RUNNER_TEMP/keyty-release"
          printf '%s' "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 -D > "$RUNNER_TEMP/keyty-release/developer-id.p12"
          printf '%s' "$NOTARY_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/keyty-release/notary-key.p8"
          printf '%s' "$SPARKLE_ED_KEY_BASE64" | base64 -D > "$RUNNER_TEMP/keyty-release/sparkle-ed-key"
          test -s "$RUNNER_TEMP/keyty-release/developer-id.p12" || { echo "Decoded Developer ID certificate is empty" >&2; exit 1; }
          test -s "$RUNNER_TEMP/keyty-release/notary-key.p8" || { echo "Decoded notary key is empty" >&2; exit 1; }
          test -s "$RUNNER_TEMP/keyty-release/sparkle-ed-key" || { echo "Decoded Sparkle EdDSA key is empty" >&2; exit 1; }

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$CERTIFICATE_PASSWORD" || { echo "Missing DEVELOPER_ID_CERTIFICATE_PASSWORD secret" >&2; exit 1; }
          test -n "$KEYCHAIN_PASSWORD" || { echo "Missing RELEASE_KEYCHAIN_PASSWORD secret" >&2; exit 1; }
          openssl pkcs12 \
            -legacy \
            -in "$RUNNER_TEMP/keyty-release/developer-id.p12" \
            -passin "pass:$CERTIFICATE_PASSWORD" \
            -info \
            -noout >/dev/null
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/keyty-release.keychain-db"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/keyty-release.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$RUNNER_TEMP/keyty-release.keychain-db"
          security import "$RUNNER_TEMP/keyty-release/developer-id.p12" \
            -k "$RUNNER_TEMP/keyty-release.keychain-db" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$RUNNER_TEMP/keyty-release.keychain-db" login.keychain-db
          security default-keychain -s "$RUNNER_TEMP/keyty-release.keychain-db"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$RUNNER_TEMP/keyty-release.keychain-db"

      - name: Release
        env:
          NOTARY_KEY_PATH: ${{ runner.temp }}/keyty-release/notary-key.p8
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER }}
          SPARKLE_ED_KEY_FILE: ${{ runner.temp }}/keyty-release/sparkle-ed-key
        run: bundle exec fastlane release

      - name: Upload appcast artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appcast-artifacts
          path: dist/
          if-no-files-found: error
